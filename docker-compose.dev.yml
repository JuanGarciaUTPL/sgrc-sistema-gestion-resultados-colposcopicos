version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgrc-postgres-dev
    environment:
      POSTGRES_DB: sgrc_db
      POSTGRES_USER: sgrc_user
      POSTGRES_PASSWORD: sgrc_password_dev_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgrc_user -d sgrc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgrc-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgrc-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sgrc.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - sgrc-network

volumes:
  pgdata:
    driver: local

networks:
  sgrc-network:
    driver: bridge
